<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Recipe Finder</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 90%;
        max-width: 750px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        text-align: center;
        color: white;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 28px;
    }

    p {
        margin-bottom: 20px;
        opacity: 0.9;
    }

    .input-box {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
    }

    input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    button {
        padding: 12px 18px;
        border: none;
        border-radius: 10px;
        background: #ff7a18;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff5200;
        transform: scale(1.05);
    }

    .results {
        margin-top: 20px;
        text-align: left;
        max-height: 350px;
        overflow-y: auto;
    }

    .card {
        background: rgba(255, 255, 255, 0.2);
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 15px;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.3);
    }

    .match {
        color: #00ffcc;
        font-weight: bold;
    }

    .missing {
        color: #ff4d4d;
    }

    .steps {
        font-size: 13px;
        opacity: 0.9;
    }

    /* Scrollbar styling */
    .results::-webkit-scrollbar {
        width: 6px;
    }

    .results::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🍳 Smart Recipe Finder</h1>
    <p>Type your ingredients and discover recipes instantly</p>

    <div class="input-box">
        <input type="text" id="ingredients" placeholder="e.g. rice, tomato, onion">
        <button onclick="findRecipes()">Search</button>
    </div>

    <div class="results" id="results"></div>
</div>

<script>
const recipes = {
    "Tomato Rice": {
        ingredients: ["rice", "tomato", "onion", "oil", "salt"],
        steps: "Cook rice → fry onion & tomato → mix → add salt"
    },
    "Omelette": {
        ingredients: ["egg", "onion", "salt", "oil"],
        steps: "Beat eggs → add onion & salt → cook"
    },
    "Fried Rice": {
        ingredients: ["rice", "vegetables", "oil", "soy sauce"],
        steps: "Heat oil → add vegetables → add rice → stir fry"
    },
    "Maggi": {
        ingredients: ["maggi", "water", "masala"],
        steps: "Boil water → add maggi → cook with masala"
    },
    "Sandwich": {
        ingredients: ["bread", "butter", "vegetables"],
        steps: "Apply butter → add vegetables → toast"
    }
};

function findRecipes() {
    let input = document.getElementById("ingredients").value.toLowerCase();
    let userIngredients = input.split(",").map(i => i.trim());

    let results = [];

    for (let dish in recipes) {
        let required = recipes[dish].ingredients;

        let matched = required.filter(item => userIngredients.includes(item));
        let matchPercent = (matched.length / required.length) * 100;

        let missing = required.filter(item => !userIngredients.includes(item));

        results.push({
            name: dish,
            match: matchPercent,
            missing: missing,
            steps: recipes[dish].steps
        });
    }

    results.sort((a, b) => b.match - a.match);

    let output = "";

    results.forEach(r => {
        if (r.match > 30) {
            output += `
            <div class="card">
                <h3>${r.name}</h3>
                <p class="match">Match: ${r.match.toFixed(0)}%</p>
                <p><b>Missing:</b> <span class="missing">${r.missing.join(", ") || "None"}</span></p>
                <p class="steps"><b>Steps:</b> ${r.steps}</p>
            </div>
            `;
        }
    });

    if (output === "") {
        output = "<p>No recipes found. Try more ingredients.</p>";
    }

    document.getElementById("results").innerHTML = output;
}
</script>

</body>
</html>
